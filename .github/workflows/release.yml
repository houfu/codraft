name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version env
        run: echo "VERSION=${{ steps.version.outputs.version }}" >> $GITHUB_ENV

      - name: Sync plugin directory
        run: bash scripts/build-plugin.sh "${VERSION}"

      - name: Commit updated plugin/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugin/
          git diff --cached --quiet || git commit -m "chore: update plugin for release v${VERSION}"
          git push origin HEAD:main

      - name: Build Cowork ZIP
        run: |
          ZIP_NAME="codraft-v${VERSION}.zip"
          while IFS= read -r line || [[ -n "$line" ]]; do
            [ -z "$line" ] && continue
            [ "${line:0:1}" = "#" ] && continue
            FILES="$FILES $line"
          done < release-manifest.txt
          zip -r "$ZIP_NAME" $FILES
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Package plugin ZIP
        run: zip -r "codraft-plugin-v${VERSION}.zip" plugin/

      - name: Create latest-named aliases
        run: |
          cp "codraft-v${VERSION}.zip" codraft-latest.zip
          cp "codraft-plugin-v${VERSION}.zip" codraft-plugin-latest.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            codraft-plugin-v${{ env.VERSION }}.zip
            codraft-latest.zip
            codraft-plugin-latest.zip
          generate_release_notes: true
